<!DOCTYPE html>
<html>
<head>
    <title>전국 스포츠토토 판매점 지도</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; background-color: #f0f0f0; }
        
        /* 버튼 그룹 */
        .btn-group {
            position: absolute; top: 70px; right: 10px; z-index: 2000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .location-btn {
            background: #0052A4; color: white; padding: 12px 20px; 
            border: none; border-radius: 25px; cursor: pointer; 
            font-weight: bold; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .store-btn { background: #28a745; }

        /* 마커 공통 스타일 */
        .custom-pin {
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; width: 34px; height: 34px;
            color: white; font-size: 18px; border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
        /* 일반 판매점: 파란색 축구공 */
        .pin-toto { background: #0052A4; }
        /* 편의점: 초록색 상점 아이콘 */
        .pin-store { background: #28a745; }

        /* 하단 슬라이더 */
        #slider-container {
            position: absolute; bottom: 20px; left: 0; width: 100%; height: 140px;
            z-index: 1000; display: flex; overflow-x: auto; padding: 10px;
            box-sizing: border-box; gap: 15px; scrollbar-width: none;
        }
        #slider-container::-webkit-scrollbar { display: none; }
        .card {
            flex: 0 0 260px; background: white; border-radius: 12px; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
        }
        .card h4 { margin: 0 0 5px 0; font-size: 15px; color: #333; }
        .card .distance { font-size: 13px; color: #0052A4; font-weight: bold; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="btn-group">
        <button class="location-btn" onclick="findNearest('all')">📍 주변 모든 판매점</button>
        <button class="location-btn store-btn" onclick="findNearest('store')">🏪 주변 편의점 찾기</button>
    </div>
    <div id="slider-container"></div>

    <script>
        var map, markers;
        var allShops = [];
        var currentFilter = 'all';

        window.onload = function() {
            map = L.map('map', { preferCanvas: true }).setView([37.5665, 126.9780], 11);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markers = L.markerClusterGroup();

            L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "동네/주소 검색" })
                .on('markgeocode', e => map.setView(e.geocode.center, 15)).addTo(map);

            map.on('locationfound', onLocationFound);
            loadTotoDB();
        };

        async function loadTotoDB() {
            try {
                const response = await fetch('toto.geojson');
                const data = await response.json();
                
                data.features.forEach(item => {
                    const prop = item.properties;
                    const lat = parseFloat(prop.위도);
                    const lng = parseFloat(prop.경도);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const name = prop.판매점 || "스포츠토토";
                        // 편의점 여부 확인
                        const isStore = name.includes('편의점') || name.includes('CU') || name.includes('GS25') || name.includes('세븐일레븐');
                        
                        // 타입별 심볼 스타일 적용
                        const iconHtml = isStore ? '🏪' : '⚽';
                        const iconClass = isStore ? 'pin-store' : 'pin-toto';

                        const customIcon = L.divIcon({
                            html: `<div class="custom-pin ${iconClass}">${iconHtml}</div>`,
                            className: '',
                            iconSize: [34, 34],
                            iconAnchor: [17, 17]
                        });

                        const marker = L.marker([lat, lng], { icon: customIcon });
                        marker.bindPopup(`<b>${iconHtml} ${name}</b><br>${prop.주소}`);

                        markers.addLayer(marker);
                        allShops.push({ name, addr: prop.주소, isStore, latlng: L.latLng(lat, lng), marker });
                    }
                });
                map.addLayer(markers);
            } catch (err) { console.error(err); }
        }

        function findNearest(type) {
            currentFilter = type;
            map.locate({setView: true, maxZoom: 15});
        }

        function onLocationFound(e) {
            const myLoc = e.latlng;
            let targets = (currentFilter === 'store') ? allShops.filter(s => s.isStore) : allShops;

            targets.forEach(s => s.distance = myLoc.distanceTo(s.latlng));
            const closest = [...targets].sort((a, b) => a.distance - b.distance).slice(0, 5);
            
            const container = document.getElementById('slider-container');
            container.innerHTML = '';
            
            closest.forEach(shop => {
                const km = (shop.distance / 1000).toFixed(2);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h4>${shop.isStore ? '🏪' : '⚽'} ${shop.name}</h4>
                    <p>${shop.addr}</p>
                    <div class="distance">📍 약 ${km}km</div>
                `;
                card.onclick = () => {
                    map.setView(shop.latlng, 17);
                    shop.marker.openPopup();
                };
                container.appendChild(card);
            });
            L.circle(myLoc, {radius: 50, color: '#0052A4'}).addTo(map);
        }
    </script>
</body>
</html>
